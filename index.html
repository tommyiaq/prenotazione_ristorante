<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot WebLLM</title>

<!-- stile semplice e responsive -->
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #f5f5f5;
  }
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    background: #fff;
    border-bottom: 1px solid #ddd;
  }
  .message {
    margin: .5rem 0;
    max-width: 80%;
    padding: .5rem 1rem;
    border-radius: 12px;
    word-wrap: break-word;
  }
  .user { background: #dcf8c6; align-self: flex-end; }
  .bot  { background: #ececec; align-self: flex-start; }
  #input-area {
    display: flex;
    padding: .5rem;
    background: #fafafa;
  }
  #input-area input {
    flex: 1;
    padding: .5rem;
    font-size: 1rem;
  }
  #input-area button {
    margin-left: .5rem;
    padding: .5rem 1rem;
    font-size: 1rem;
  }
</style>

<!-- WebLLM will be imported by script.js as an ES module -->
</head>
<body>

<div id="chat-container"></div>
<!--
  Nota: per motivi di CORS i modelli scaricati da HuggingFace non vengono
  caricati correttamente quando la pagina è ospitata su github.io o un altro
  dominio. Scarica il modello e inseriscilo in una cartella "model" nello
  stesso repository, quindi modifica MODEL_URL in script.js per puntare a
  "./model/".
  
  Inoltre, WebLLM richiede il file wasm compilato (es. <code>model.wasm</code>)
  identificato da `model_lib` nella configurazione. Assicurati che questo file
  sia disponibile nello stesso percorso e servito con le stesse regole CORS.
-->

<div id="input-area">
  <input type="text" id="user-input" placeholder="Scrivi un messaggio..." />
  <button onclick="sendMessage()">Invia</button>
</div>

<!-- module script esterno -->
<script type="module" src="script.js"></script>
</body>
</html>
