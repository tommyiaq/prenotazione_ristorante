<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebLLM Tiny Chat (Client-side)</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin:0; padding:16px; font-family:system-ui,Arial;
      display:grid; grid-template-rows:auto 1fr auto; height:100dvh; gap:12px;
      background:Canvas; color:CanvasText;
    }
    #chat {
      border:1px solid color-mix(in oklab, CanvasText 20%, Canvas 80%);
      border-radius:12px; padding:12px; overflow-y:auto;
    }
    .msg{margin:0 0 10px;}
    .role{font-weight:700; opacity:.9;}
    .bubble{
      display:inline-block; padding:8px 10px; border-radius:10px;
      background:color-mix(in oklab, CanvasText 10%, Canvas 90%);
      max-width:min(70ch,100%); white-space:pre-wrap;
    }
    form{display:grid; grid-template-columns:1fr auto; gap:8px;}
    input{padding:10px; border-radius:10px; border:1px solid #ccc;}
    button{padding:10px 14px; border-radius:10px; border:none; background:#2f6fff; color:white;}
    button:disabled{opacity:.6;}

    #loading-overlay{
      position:fixed; inset:0; display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      background:rgba(0,0,0,0.15); backdrop-filter:blur(4px);
      z-index:200; text-align:center;
    }
    .spinner{
      width:38px; height:38px; border-radius:50%;
      border:4px solid color-mix(in oklab, CanvasText 40%, Canvas 60%);
      border-top-color:transparent; animation:spin 1s linear infinite;
      margin-bottom:12px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    #error-box{
      display:none; margin-top:10px; padding:10px;
      background:color-mix(in oklab, #d33 20%, Canvas 80%);
      border-radius:8px; white-space:pre-wrap; max-width:700px;
    }
  </style>
</head>

<body>

  <h2>Tiny WebLLM Chat</h2>
  <div id="chat"></div>

  <form id="chat-form">
    <input id="user-input" type="text" placeholder="Type…" disabled>
    <button id="send-btn" disabled>Send</button>
  </form>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading WebLLM…</div>
    <div id="error-box"></div>
    <button id="retry-btn" style="display:none;">Retry</button>
  </div>

  <!-- ✅ FIXED: Load WebLLM from UNPKG instead of jsDelivr -->
  https://unpkg.com/@mlc-ai/web-llm/dist/webllm.min.js</script>

  <script>
    const chatEl=document.getElementById("chat");
    const inputEl=document.getElementById("user-input");
    const sendBtn=document.getElementById("send-btn");
    const formEl=document.getElementById("chat-form");
    const overlay=document.getElementById("loading-overlay");
    const loadingText=document.getElementById("loading-text");
    const errorBox=document.getElementById("error-box");
    const retryBtn=document.getElementById("retry-btn");

    let llm=null;
    const MODEL_URL="https://huggingface.co/mlc-ai/TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC/resolve/main/?download=true";

    function appendMessage(role,text){
      const wrap=document.createElement("div");
      wrap.className="msg";
      wrap.innerHTML=`<div class="role">${role}</div><div class="bubble">${text}</div>`;
      chatEl.appendChild(wrap);
      chatEl.scrollTop=chatEl.scrollHeight;
    }

    function showError(msg){
      errorBox.textContent=msg;
      errorBox.style.display="block";
      retryBtn.style.display="inline-block";
    }

    function readyUI(){
      overlay.style.display="none";
      inputEl.disabled=false;
      sendBtn.disabled=false;
      inputEl.focus();
    }

    async function initModel(){
      try{
        if(typeof window.webllm==="undefined"){
          throw new Error("WebLLM script did not load.");
        }
        loadingText.textContent="Checking WebGPU…";
        if(!("gpu" in navigator)){
          throw new Error("WebGPU not available. Use Chrome/Edge 121+.");
        }

        const adapter=await navigator.gpu.requestAdapter();
        if(!adapter){
          throw new Error("WebGPU adapter not available.");
        }

        loadingText.textContent="Initializing model…";

        llm=await webllm.createLLM({
          model_url:MODEL_URL,
          on_progress:p=>{
            loadingText.textContent=`Downloading model… ${Math.round(p*100)}%`;
          }
        });

        loadingText.textContent="Warming up…";
        await llm.chat.completions.create({
          messages:[{role:"user",content:"Say 'ready'."}],
          max_tokens:4
        });

        readyUI();

      }catch(err){
        console.error(err);
        showError("Initialization failed:\n"+err.message);
      }
    }

    retryBtn.onclick=()=>{ errorBox.style.display="none"; retryBtn.style.display="none"; initModel(); };

    formEl.addEventListener("submit",e=>{
      e.preventDefault();
      const t=inputEl.value.trim();
      if(!t) return;
      inputEl.value="";
      appendMessage("You",t);
      inputEl.disabled=true;
      sendBtn.disabled=true;

      llm.chat.completions.create({messages:[{role:"user",content:t}]})
        .then(r=>{
          appendMessage("AI", r.choices[0].message.content);
        })
        .catch(err=>{
          appendMessage("AI","Error: "+err.message);
        })
        .finally(()=>{
          inputEl.disabled=false;
          sendBtn.disabled=false;
          inputEl.focus();
        });
    });

    window.addEventListener("DOMContentLoaded",initModel);
  </script>
</body>
</html>
