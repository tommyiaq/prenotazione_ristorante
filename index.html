<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebLLM Ultra‑Light Chat</title>

  <style>
    :root { color-scheme: light dark; }

    body {
      margin: 0; padding: 16px; font-family: system-ui, Arial, sans-serif;
      background: Canvas; color: CanvasText;
      display: grid; grid-template-rows: auto 1fr auto; height: 100dvh; gap: 12px;
    }

    h1 { font-size: 1.2rem; margin: 0 0 4px 0; }

    /* Loading overlay */
    #loading-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.15);
      backdrop-filter: blur(4px);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      font-size: 1rem;
      z-index: 200;
    }

    .spinner {
      width: 38px; height: 38px;
      border: 4px solid color-mix(in oklab, CanvasText 40%, Canvas 60%);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #chat {
      border: 1px solid color-mix(in oklab, CanvasText 20%, Canvas 80%);
      border-radius: 12px; padding: 12px;
      overflow-y: auto; background: Canvas;
    }

    .msg { margin: 0 0 10px }
    .role  { font-weight: 700; font-size: .9rem; opacity: .9 }
    .bubble {
      display: inline-block; padding: 8px 10px; border-radius: 10px;
      background: color-mix(in oklab, CanvasText 10%, Canvas 90%);
      white-space: pre-wrap; max-width: min(70ch, 100%);
    }

    form { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    input[type="text"] {
      padding: 10px; border-radius: 10px; border: 1px solid color-mix(in oklab, CanvasText 15%, Canvas 85%);
      background: Canvas; color: CanvasText;
    }
    button {
      padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer;
      background: #2f6fff; color: white; font-weight: 600;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }

  </style>
</head>

<body>

  <header>
    <h1>WebLLM Ultra‑Light Chatbot</h1>
  </header>

  <main id="chat" aria-live="polite"></main>

  <footer>
    <form id="chat-form">
      <input id="user-input" type="text" placeholder="Type a message…" autocomplete="off" disabled />
      <button id="send-btn" type="submit" disabled>Send</button>
    </form>
  </footer>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading model… please wait</div>
  </div>

  <!-- WebLLM CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm/dist/webllm.min.js"></script>

  <script>
    const chatEl   = document.getElementById('chat');
    const formEl   = document.getElementById('chat-form');
    const inputEl  = document.getElementById('user-input');
    const sendBtn  = document.getElementById('send-btn');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText    = document.getElementById('loading-text');

    let llm = null;

    function appendMessage(role, text) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;

      const roleDiv = document.createElement('div');
      roleDiv.className = 'role';
      roleDiv.textContent = role === 'user' ? 'You' : 'AI';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrap.appendChild(roleDiv);
      wrap.appendChild(bubble);
      chatEl.appendChild(wrap);

      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function initModel() {
      try {
        loadingText.textContent = "Initializing WebLLM…";

        // SUPER-LIGHT MODEL
        const modelURL =
          "https://huggingface.co/mlc-ai/Qwen2.5-0.5B-Instruct-q4f16_1-MLC/resolve/main/";

        llm = await webllm.createLLM({
          model_url: modelURL,
          on_progress: (p) => {
            loadingText.textContent = "Loading model… " + Math.round(p * 100) + "%";
          }
        });

        loadingText.textContent = "Model ready!";
        setTimeout(() => loadingOverlay.style.display = "none", 400);

        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();

      } catch (err) {
        loadingText.textContent = "Error loading model. Check WebGPU or reload.";
        console.error(err);
      }
    }

    async function handleSend(text) {
      inputEl.value = "";
      inputEl.disabled = true;
      sendBtn.disabled = true;

      appendMessage("user", text);

      try {
        const res = await llm.chat.completions.create({
          messages: [{ role: "user", content: text }]
        });

        const reply = res?.choices?.[0]?.message?.content ?? "(no response)";
        appendMessage("ai", reply);

      } catch (err) {
        console.error(err);
        appendMessage("ai", "Error while generating response.");
      }

      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      handleSend(text);
    });

    // Start model on page load
    initModel();
  </script>

</body>
</html>
