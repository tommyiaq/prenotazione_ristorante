<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebLLM Chat (FAST, WORKING)</title>

  <style>
    body {
      margin: 0; padding: 16px;
      font-family: system-ui, Arial, sans-serif;
      display: grid; grid-template-rows: auto 1fr auto;
      height: 100vh; gap: 12px;
      background: Canvas; color: CanvasText;
    }
    #chat { border: 1px solid #ccc; border-radius: 12px;
      padding: 12px; overflow-y: auto; }
    .msg { margin: 0 0 10px; }
    .role { font-weight: bold; }
    .bubble { padding: 8px 10px; border-radius: 10px;
      background: color-mix(in oklab, CanvasText 15%, Canvas 85%); }
    form { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    input { padding: 10px; border-radius: 10px; border: 1px solid #ccc; }
    button { padding: 10px 14px; background: #2f6fff; border: none; color: white; }
    #overlay { position: fixed; inset: 0; display: flex;
      justify-content: center; align-items: center;
      background: rgba(0,0,0,.2); backdrop-filter: blur(4px);
      flex-direction: column; gap: 12px; z-index: 100; }
  </style>
</head>

<body>

  <h2>WebLLM Chat (Qwen2.5 1.5B)</h2>
  <div id="chat"></div>

  <form id="chat-form">
    <input id="user" disabled placeholder="Loading…">
    <button id="send" disabled>Send</button>
  </form>

  <div id="overlay">
    <div>Loading model…</div>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chat = document.getElementById("chat");
    const user = document.getElementById("user");
    const send = document.getElementById("send");
    const form = document.getElementById("chat-form");
    const overlay = document.getElementById("overlay");

    function say(role, text) {
      const m = document.createElement("div");
      m.className = "msg";
      m.innerHTML = `<div class="role">${role}</div><div class="bubble">${text}</div>`;
      chat.appendChild(m);
      chat.scrollTop = chat.scrollHeight;
    }

    let engine = null;

    async function init() {
      try {
        overlay.innerHTML = "<div>Initializing WebGPU…</div>";

        if (!("gpu" in navigator))
          throw new Error("WebGPU not supported!");

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter)
          throw new Error("No WebGPU adapter.");

        overlay.innerHTML = "<div>Loading model… (Qwen2.5-1.5B)</div>";

        // ⭐ PREBUILT MODEL — guaranteed to work
        engine = await webllm.CreateMLCEngine(
          "Qwen2.5-1.5B-Instruct-q4f16_1-MLC",
          {
            initProgressCallback: p => {
              overlay.innerHTML = `<div>${p.text || "Loading…"} ${
                p.progress ? Math.round(p.progress * 100) + "%" : ""
              }</div>`;
            }
          }
        );

        overlay.style.display = "none";
        user.disabled = false;
        send.disabled = false;
        user.placeholder = "Type…";

      } catch (e) {
        overlay.innerHTML = `<div style="color:red;">Error: ${e.message}</div>`;
        console.error(e);
      }
    }

    form.onsubmit = async e => {
      e.preventDefault();
      const txt = user.value.trim();
      if (!txt) return;

      say("You", txt);
      user.value = "";

      const res = await engine.chat.completions.create({
        messages: [{ role: "user", content: txt }]
      });

      say("AI", res.choices[0].message.content);
    };

    init();
  </script>

</body>
</html>
