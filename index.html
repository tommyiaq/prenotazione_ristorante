<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebLLM Tiny Chat (Client‑Side, No Token)</title>
  <style>
    :root { color-scheme: light dark; }

    body {
      margin: 0; padding: 16px; font-family: system-ui, Arial, sans-serif;
      background: Canvas; color: CanvasText;
      display: grid; grid-template-rows: auto 1fr auto; height: 100dvh; gap: 12px;
    }

    #chat {
      border: 1px solid color-mix(in oklab, CanvasText 20%, Canvas 80%);
      border-radius: 12px; padding: 12px; overflow-y: auto;
    }

    .msg { margin-bottom: 10px; }
    .role { font-weight: bold; }
    .bubble {
      background: color-mix(in oklab, CanvasText 10%, Canvas 90%);
      padding: 8px 10px; border-radius: 10px;
      white-space: pre-wrap; max-width: 70ch;
    }

    form { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    input { padding: 10px; border-radius: 10px; border: 1px solid #ccc; }
    button { padding: 10px 14px; border-radius: 10px; border: none; background: #2f6fff; color: white; }
    button:disabled { opacity: .6; }

    #loading-overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: rgba(0,0,0,0.15); backdrop-filter: blur(4px);
      z-index: 100;
    }

    .spinner {
      width: 38px; height: 38px; border-radius: 50%;
      border: 4px solid color-mix(in oklab, CanvasText 50%, Canvas 50%);
      border-top-color: transparent;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-box {
      display: none; background: #ffb3b3; padding: 10px;
      border-radius: 8px; white-space: pre-wrap; max-width: 80%;
    }
  </style>
</head>

<body>

  <h2>WebLLM Tiny Chatbot</h2>
  <div id="chat"></div>

  <form id="chat-form">
    <input id="user-input" type="text" placeholder="Type…" disabled />
    <button id="send-btn" disabled>Send</button>
  </form>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading WebLLM…</div>
    <div id="error-box"></div>
    <button id="retry-btn" style="display:none;">Retry</button>
  </div>

  <!-- Correct, working script import -->
  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const formEl = document.getElementById("chat-form");
    const overlay = document.getElementById("loading-overlay");
    const stat = document.getElementById("loading-text");
    const errBox = document.getElementById("error-box");
    const retry = document.getElementById("retry-btn");

    const MODEL = "https://huggingface.co/mlc-ai/TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC/resolve/main/?download=true";

    function say(role, text) {
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<div class="role">${role}</div><div class="bubble">${text}</div>`;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    let engine = null;

    async function init() {
      try {
        stat.textContent = "Checking WebGPU…";

        if (!("gpu" in navigator)) {
          throw new Error("WebGPU not available. Use Chrome/Edge.");
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error("WebGPU adapter unavailable.");

        stat.textContent = "Loading model…";

        engine = await webllm.CreateMLCEngine(
          "TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC",
          {
            appConfig: {
              model_list: [
                {
                  model: MODEL,
                  model_id: "TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC",
                }
              ]
            },
            initProgressCallback: (p) => {
              const pct = p.progress ? ` ${Math.round(p.progress * 100)}%` : "";
              stat.textContent = p.text + pct;
            }
          }
        );

        stat.textContent = "Warming up…";
        await engine.chat.completions.create({
          messages: [{ role: "user", content: "ready?" }],
          max_tokens: 4
        });

        overlay.style.display = "none";
        inputEl.disabled = false;
        sendBtn.disabled = false;

      } catch (e) {
        console.error(e);
        errBox.style.display = "block";
        errBox.textContent = "Initialization failed:\n" + e.message;
        retry.style.display = "inline-block";
      }
    }

    retry.onclick = () => {
      errBox.style.display = "none";
      retry.style.display = "none";
      init();
    };

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      const t = inputEl.value.trim();
      if (!t) return;
      inputEl.value = "";
      say("You", t);

      engine.chat.completions.create({ messages: [{ role: "user", content: t }] })
        .then(r => say("AI", r.choices[0].message.content))
        .catch(err => say("AI","Error: " + err.message));
    });

    window.addEventListener("DOMContentLoaded", init);
  </script>

</body>
</html>
