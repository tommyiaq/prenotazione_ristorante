<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebLLM Tiny Chat</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin:0; padding:16px; font-family:system-ui, Arial;
      display:grid; grid-template-rows:auto 1fr auto; height:100dvh; gap:12px;
      background:Canvas; color:CanvasText;
    }
    #chat {
      border:1px solid color-mix(in oklab, CanvasText 20%, Canvas 80%);
      border-radius:12px; padding:12px; overflow-y:auto;
    }
    .msg{margin:0 0 10px;}
    .role{font-weight:700;}
    .bubble{
      display:inline-block; padding:8px 10px; border-radius:10px;
      background:color-mix(in oklab, CanvasText 10%, Canvas 90%);
      white-space:pre-wrap; max-width:70ch;
    }
    form{display:grid; grid-template-columns:1fr auto; gap:8px;}
    input{padding:10px; border-radius:10px; border:1px solid #ccc;}
    button{
      padding:10px 14px; border-radius:10px; border:none;
      background:#2f6fff; color:white; font-weight:600;
    }
    button:disabled{opacity:.6;}

    #overlay{
      position:fixed; inset:0; background:rgba(0,0,0,.15);
      backdrop-filter:blur(4px);
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      z-index:100;
    }
    .spinner{
      width:38px; height:38px; border-radius:50%;
      border:4px solid color-mix(in oklab, CanvasText 50%, Canvas 50%);
      border-top-color:transparent;
      animation:spin 1s linear infinite; margin-bottom:12px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    #err{display:none; white-space:pre-wrap; padding:10px;
      background:#ffb3b3; border-radius:8px; max-width:80%; }
  </style>
</head>

<body>

  <h2>WebLLM Tiny Chatbot</h2>
  <div id="chat"></div>

  <form id="chat-form">
    <input id="user" placeholder="Type…" disabled />
    <button id="send" disabled>Send</button>
  </form>

  <div id="overlay">
    <div class="spinner"></div>
    <div id="stat">Loading WebLLM…</div>
    <div id="err"></div>
    <button id="retry" style="display:none;">Retry</button>
  </div>

  <!-- ✅ NEW OFFICIAL CDN -->
  https://mlc.ai/web-llm/releases/v0.2.0/webllm.min.js</script>

  <script>
    const chat=document.getElementById("chat");
    const inp=document.getElementById("user");
    const send=document.getElementById("send");
    const form=document.getElementById("chat-form");
    const overlay=document.getElementById("overlay");
    const stat=document.getElementById("stat");
    const err=document.getElementById("err");
    const retry=document.getElementById("retry");

    function say(role, text){
      const d=document.createElement("div");
      d.className="msg";
      d.innerHTML=`<div class="role">${role}</div><div class="bubble">${text}</div>`;
      chat.appendChild(d);
      chat.scrollTop=chat.scrollHeight;
    }

    const MODEL="https://huggingface.co/mlc-ai/TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC/resolve/main/?download=true";

    async function init(){
      try{
        if(typeof webllm==="undefined") throw new Error("WebLLM script did not load.");

        stat.textContent="Checking WebGPU…";
        if(!("gpu" in navigator)) throw new Error("WebGPU not available.");

        const adapter=await navigator.gpu.requestAdapter();
        if(!adapter) throw new Error("WebGPU adapter unavailable.");

        stat.textContent="Loading model…";

        const llm=await webllm.createLLM({
          model_url:MODEL,
          on_progress:p=>{
            stat.textContent=`Downloading model… ${Math.round(p*100)}%`;
          }
        });

        stat.textContent="Warming up…";
        await llm.chat.completions.create({
          messages:[{role:"user", content:"ready?"}],
          max_tokens:4
        });

        overlay.style.display="none";
        inp.disabled=false; send.disabled=false;

        form.onsubmit=e=>{
          e.preventDefault();
          const t=inp.value.trim();
          if(!t) return;
          say("You",t);
          inp.value="";
          llm.chat.completions.create({messages:[{role:"user",content:t}]})
            .then(r=>say("AI",r.choices[0].message.content))
            .catch(e=>say("AI","Error: "+e.message));
        };

      }catch(e){
        console.error(e);
        err.style.display="block";
        err.textContent="Initialization failed:\n"+e.message;
        retry.style.display="inline-block";
      }
    }

    retry.onclick=()=>{ err.style.display="none"; retry.style.display="none"; init(); };

    window.addEventListener("DOMContentLoaded",init);
  </script>

</body>
</html>
